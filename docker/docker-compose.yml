# Docker Compose for the SSL-GraphAnomaly inference API + optional NGINX
# reverse proxy. Bring up with:
#
#     docker compose -f docker/docker-compose.yml up --build
#
# The detector runs on port 8014 inside the network; NGINX exposes it on
# host port 80 with the standard /api/v1/* path.

version: "3.9"

services:
  ssl-graph-anomaly:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: ssl-graphanomaly:latest
    container_name: ssl-graph-anomaly
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - SSLGA_PORT=8014
    volumes:
      - ./data:/workspace/data
      - ./outputs:/workspace/outputs
    expose:
      - "8014"
    ports:
      - "8014:8014"
    command: ["python", "-m", "ssl_graph_anomaly.inference.serve"]
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: ["gpu"]

  nginx:
    image: nginx:1.27-alpine
    container_name: ssl-graph-anomaly-nginx
    restart: unless-stopped
    depends_on:
      - ssl-graph-anomaly
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    profiles:
      - "proxy"

volumes:
  data:
  outputs:
